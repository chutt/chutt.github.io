    <!-- Header -->
    <header>
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <img class="img-responsive" src="/img/logo.png" alt="" width="325px">
                    <div class="intro-text">
                        <span class="name">Bienvenue !</span>
                        <hr class="star-light">
                        <span class="skills">{{ site.skills }}</span>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Stats Bar -->
    <section class="stats-bar">
        <div class="container">
            <div class="row">
                <div class="col-sm-4">
                    <div class="stat-item">
                        <div class="stat-number">75 dB</div>
                        <div class="stat-label">Bruit moyen subi</div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="stat-item">
                        {% assign current_year = site.time | date: '%Y' | plus: 0 %}
                        {% assign years = current_year | minus: 2019 %}
                        <div class="stat-number">{{ years }} ans</div>
                        <div class="stat-label">De mobilisation</div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="stat-item">
                        <div class="stat-number">A51</div>
                        <div class="stat-label">Traversant Septèmes</div>
                    </div>
                </div>
            </div>
        </div>
    </section>
